<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kindness generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap">
</head>
<body>

    <div class="container">

        <header>
            <span class="site-label">✦ Daily Challenge</span>
            <h1>Random Acts<br>of <em>kindness</em></h1>
            <p class="subtitle">One small act, every day.<br>The world gets better one person at a time.</p>
        </header>

        <div class="streak-bar">
            <div class="streak-pill">
                <span>&#128293</span>
                <span class="streak-num" id="streakNum">0</span>
                <span>day streak</span>
            </div>
            <div class="streak-pill accent">
                 <span>&#10003;</span>
                 <span class="streak-num" id="totalNum">0</span>
                 <span>total</span>
            </div>
        </div>

        <div class="filters" id="filtersEl">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="friends">Friends</button>
            <button class="filter-btn" data-cat="family">Family</button>
            <button class="filter-btn" data-cat="strangers">Strangers</button>
            <button class="filter-btn" data-cat="online">Online</button>
            <button class="filter-btn" data-cat="environment">Planet</button>
            <button class="filter-btn" data-cat="self">Self-care</button>
        </div>

        <div class="card-warp">
            <div class="challenge-card" id="challengeCard">
                <div>
                    <div class="card-top">
                        <span class="cat-tag" id="catTag">-</span>
                        <div class="diff-dots" id="diffDots"></div>
                    </div>
                    <p class="challenge-text" id="challengeText">Press "New challenge" to get started.</p>
                </div>
                <p class="challenge-why" id="challengeWhy">&nbsp;</p>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="generateBtn" onclick="generate()" data-hover="ready to start some kindness?">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                    <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
                
                <span class="teks-container">
                    <span class="teks-wrapper">
                        <span class="teks-awal">New challenge</span>
                        <span class="teks-hover">Ready to start some kindness?</span>
                    </span>
                </span>
            </button>

            <button class="btn btn-done" id="doneBtn" onclick="markDone()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                i did it!!
            </button>
            <button class="btn btn-secondary" onclick="shareChallenge()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                   <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                   <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                   <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                share
            </button>
        </div>

        <div class="divider"></div>

        <div class="log-section">
            <div class="log-header">
                <span class="log-title"> your completed acts</span>
                <span class="log-count" id="logCount">0</span>
            </div>

            <div class="log-grid" id="logGrid">
                <div class="log-empty">Nothing yet — go be kind! &#10024;</div>
            </div>
        </div>

        <footer>
            "No act of kindness, however small, is ever wasted." — Aesop
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>  v
</body>
</html>
